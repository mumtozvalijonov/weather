services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8000"
      REDIS_ADDR: "redis:6379"
      OPEN_METEO_BASE_URL: "https://api.open-meteo.com/v1/forecast"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:8.8.0-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data

volumes:
  redis-data:
